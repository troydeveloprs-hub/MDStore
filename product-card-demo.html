<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Card Demo</title>
  <link rel="stylesheet" href="css/sofie.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background: #f0f0f0; padding: 40px; min-height: 100vh;">
  
  <div style="max-width: 1200px; margin: 0 auto;">
    <h1 style="text-align: center; margin-bottom: 40px;">Product Card Demo</h1>
    
    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px;">
      
      <!-- Product Card 1 -->
      <article class="product-card-new">
        <div class="product-card-new__image-section">
          <img src="https://via.placeholder.com/300x400/f5f5f5/333?text=HUDA+BEAUTY" alt="#FAUXFILTER Under Eye Concealer" class="product-card-new__image">
          
          <div class="product-card-new__actions">
            <button class="product-card-new__action-btn" aria-label="Quick view">
              <i class="fa-regular fa-eye"></i>
            </button>
            <button class="product-card-new__action-btn" aria-label="Add to cart">
              <i class="fa-solid fa-cart-shopping"></i>
            </button>
          </div>
        </div>
        
        <div class="product-card-new__details">
          <span class="product-card-new__brand">HUDA BEAUTY</span>
          <h3 class="product-card-new__title">#FAUXFILTER Under Eye Concealer</h3>
          <div class="product-card-new__price">LE 4,650.00</div>
          
          <div class="product-card-new__variants">
            <img src="https://via.placeholder.com/28x28/f5f5f5/333?text=1" alt="Variant 1" class="product-card-new__variant">
            <img src="https://via.placeholder.com/28x28/f5f5f5/333?text=2" alt="Variant 2" class="product-card-new__variant">
            <img src="https://via.placeholder.com/28x28/f5f5f5/333?text=3" alt="Variant 3" class="product-card-new__variant">
            <div class="product-card-new__variant-more">+4</div>
          </div>
        </div>
      </article>
      
      <!-- Product Card 2 -->
      <article class="product-card-new">
        <div class="product-card-new__image-section">
          <img src="https://via.placeholder.com/300x400/f5f5f5/333?text=NARS" alt="Radiant Creamy Concealer" class="product-card-new__image">
          
          <div class="product-card-new__actions">
            <button class="product-card-new__action-btn" aria-label="Quick view">
              <i class="fa-regular fa-eye"></i>
            </button>
            <button class="product-card-new__action-btn" aria-label="Add to cart">
              <i class="fa-solid fa-cart-shopping"></i>
            </button>
          </div>
        </div>
        
        <div class="product-card-new__details">
          <span class="product-card-new__brand">NARS</span>
          <h3 class="product-card-new__title">Radiant Creamy Concealer</h3>
          <div class="product-card-new__price">LE 3,200.00</div>
          
          <div class="product-card-new__variants">
            <img src="https://via.placeholder.com/28x28/f5f5f5/333?text=1" alt="Variant 1" class="product-card-new__variant">
            <img src="https://via.placeholder.com/28x28/f5f5f5/333?text=2" alt="Variant 2" class="product-card-new__variant">
            <div class="product-card-new__variant-more">+2</div>
          </div>
        </div>
      </article>
      
      <!-- Product Card 3 -->
      <article class="product-card-new">
        <div class="product-card-new__image-section">
          <img src="https://via.placeholder.com/300x400/f5f5f5/333?text=MAC" alt="Studio Fix Concealer" class="product-card-new__image">
          
          <div class="product-card-new__actions">
            <button class="product-card-new__action-btn" aria-label="Quick view">
              <i class="fa-regular fa-eye"></i>
            </button>
            <button class="product-card-new__action-btn" aria-label="Add to cart">
              <i class="fa-solid fa-cart-shopping"></i>
            </button>
          </div>
        </div>
        
        <div class="product-card-new__details">
          <span class="product-card-new__brand">MAC</span>
          <h3 class="product-card-new__title">Studio Fix Concealer</h3>
          <div class="product-card-new__price">LE 2,850.00</div>
          
          <div class="product-card-new__variants">
            <img src="https://via.placeholder.com/28x28/f5f5f5/333?text=1" alt="Variant 1" class="product-card-new__variant">
            <img src="https://via.placeholder.com/28x28/f5f5f5/333?text=2" alt="Variant 2" class="product-card-new__variant">
            <img src="https://via.placeholder.com/28x28/f5f5f5/333?text=3" alt="Variant 3" class="product-card-new__variant">
            <img src="https://via.placeholder.com/28x28/f5f5f5/333?text=4" alt="Variant 4" class="product-card-new__variant">
            <div class="product-card-new__variant-more">+5</div>
          </div>
        </div>
      </article>
      
      <!-- Product Card 4 -->
      <article class="product-card-new">
        <div class="product-card-new__image-section">
          <img src="https://via.placeholder.com/300x400/f5f5f5/333?text=DIOR" alt="Forever Skin Concealer" class="product-card-new__image">
          
          <div class="product-card-new__actions">
            <button class="product-card-new__action-btn" aria-label="Quick view">
              <i class="fa-regular fa-eye"></i>
            </button>
            <button class="product-card-new__action-btn" aria-label="Add to cart">
              <i class="fa-solid fa-cart-shopping"></i>
            </button>
          </div>
        </div>
        
        <div class="product-card-new__details">
          <span class="product-card-new__brand">DIOR</span>
          <h3 class="product-card-new__title">Forever Skin Concealer</h3>
          <div class="product-card-new__price">LE 5,100.00</div>
          
          <div class="product-card-new__variants">
            <img src="https://via.placeholder.com/28x28/f5f5f5/333?text=1" alt="Variant 1" class="product-card-new__variant">
            <img src="https://via.placeholder.com/28x28/f5f5f5/333?text=2" alt="Variant 2" class="product-card-new__variant">
            <div class="product-card-new__variant-more">+3</div>
          </div>
        </div>
      </article>
      
    </div>
  </div>

</body>
</html>
